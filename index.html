<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASHYAF™ | System Initializing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0B0C10;
        }
        .fire-to-cool-glow {
            background: radial-gradient(circle at 30% 50%, rgba(220, 38, 38, 0.15) 0%, rgba(249, 115, 22, 0.1) 30%, rgba(6, 182, 212, 0.1) 60%, transparent 100%);
        }
    </style>
</head>
<body class="text-white font-sans antialiased selection:bg-cyan-500/30 overflow-hidden min-h-screen flex items-center justify-center relative">

    <div class="absolute inset-0 fire-to-cool-glow pointer-events-none" aria-hidden="true"></div>

    <main class="relative z-10 w-full max-w-md mx-auto px-6 text-center" role="main">
        
        <header class="mb-12">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-white uppercase select-none">
                FLASHY<span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-cyan-400">AF</span>™
            </h1>
        </header>

        <section class="backdrop-blur-md bg-black/40 border border-white/10 rounded-2xl p-8 shadow-2xl mb-8" aria-labelledby="status-heading">
            <div class="flex items-center justify-center gap-2 mb-4">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
                </span>
                <p id="status-heading" class="text-xs font-bold tracking-widest text-cyan-400 uppercase select-none">
                    SYSTEM INITIALIZING
                </p>
            </div>
            
            <h2 class="text-2xl font-extrabold tracking-tight text-white mb-6">
                Claim VIP Access
            </h2>

            <form action="https://usebasin.com/f/36f02f703edd" method="POST" class="space-y-4">
                <div class="relative">
                    <label for="email" class="sr-only">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="Enter your email" 
                        class="w-full px-5 py-4 bg-black border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 text-base font-medium transition-all duration-200"
                        aria-required="true"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full py-4 px-6 bg-gradient-to-r from-orange-600 to-cyan-500 hover:from-orange-500 hover:to-cyan-400 text-black font-black text-base uppercase tracking-wider rounded-xl transition-all duration-300 transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-cyan-400 shadow-lg shadow-cyan-500/20 min-h-[48px]"
                >
                    Join The Movement
                </button>
            </form>
        </section>

        <footer class="select-none">
            <p class="text-xs font-bold tracking-widest text-white/30 uppercase">
                Stealth Architecture // Tier 0.01
            </p>
        </footer>

    </main>

</body>
</html>
